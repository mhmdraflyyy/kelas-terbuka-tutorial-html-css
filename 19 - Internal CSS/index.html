<!DOCTYPE html>

<html>
    <head>
        <title>Belajar CSS</title>
    </head>

    <body>
        <h1>Hello World from CSS</h1>

        <style type="text/css">
            h1{
                color: brown;
            }

            p{  
                font-family: Arial;
                color: black;
            }

            b{
                color: brown;
            }

            i{
                color:deeppink;
                background-color:black;
            }

        </style>

        <p>
            Ini adalah percobaan pertama kita menggunakan <b>HTML</b> dengan <i>CSS</i>.
        </p>
    </body>
</html>
