<!DOCTYPE html>
<html>
    <head>
        <title>Strong, Emphasis, Blockquote dan Quote</title>
    </head>
    <body>
        <!-- strong -->
        <p>
            <strong>Perhatian:</strong> Jangan buang 
            sampah sembarangan.
        </p>

        <!-- Blockquote -->
        <blockquote>
            Mensana incorporesano,
            Men ke sana, women ke sono.
        </blockquote>


         <!-- Emphasis -->
        <p>
            Ini adalah tempat
            <em>nongkrong</em>, bukan tempat <strong>berantem</strong>.
            
        <!-- Quote  -->
            Bosku bilang, <q>Selalu jaga kesehatan</q>
        </p>

       


    </body>
</html>
