<!DOCTYPE html>

<!-- CSS = Cascading Style Sheet -->

<html>
    <head>
        <title>Pengenalan CSS</title>
    </head>

    <body>
        <h1>Halo Dunia</h1>

        <p>Hari ini cerah, pasti seru pasti asik. <i>Ucup</i> berkata, <q>hari ini saya mau main sepeda ke kota bersama <i>Otong</i>.</q> Mereka pun bertemu dengan <i>Rani,</i> teman satu sekolah.</p>

        <hr>

        <!-- Inline CSS (berada pada atribut tags html langsung dalam satu file html)-->
        <p>Inline CSS:</p>
        <h1 style="font-size: 30px; color:green;">Halo Dunia</h1>

        <hr>

        <!-- Internal CSS (berada dalam satu file html tetapi kita buat atribut baru namanya "style") -->
        <p>Internal CSS:</p>
        <style>
            h2{
                font-size: 30px;
                color: blue;
            }
        </style>

        <!-- Eksternal CSS (berada pada file terpisah, jadi ada file index.html dan style.css) -->


        <!-- CSS Selector = -->
        <!-- h1 = selector -->
        <!-- font-size & color = property -->
        <!-- 30px & blue = value -->
        


    </body>
</html>
